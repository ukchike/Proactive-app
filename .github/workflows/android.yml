name: Android CI

on:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # A recognizable filename for testers. The name is kept stable (no build
      # number) so the /releases/latest download URL never changes.
      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk UnifiedProductivity.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unified-productivity-debug-apk
          path: UnifiedProductivity.apk
          if-no-files-found: error

      # On main, publish the APK to a GitHub Release so it can be downloaded
      # without a login. The "latest" release always points at the newest build,
      # giving a stable URL:
      #   https://github.com/<owner>/<repo>/releases/latest/download/UnifiedProductivity.apk
      - name: Publish APK to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-build.${{ github.run_number }}
          name: Unified Productivity build ${{ github.run_number }}
          # Must be a full (non-pre) release so GitHub's /releases/latest endpoint
          # resolves it — that's what makes the stable download URL work.
          make_latest: true
          prerelease: false
          body: |
            Automated test build from `main` (commit ${{ github.sha }}).

            Download `UnifiedProductivity.apk` below. This is an unsigned debug
            build — enable "install from unknown sources" to sideload it.
          files: UnifiedProductivity.apk
